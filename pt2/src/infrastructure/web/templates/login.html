<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SGA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="brand">
            <div class="brand-mark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>
            </div>
        </div>
        <div class="login-title">Acesso ao SGA</div>
        <div class="login-sub">Sistema de Gestão Acadêmica — acesso restrito.</div>
        {% if erro %}
        <div class="login-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
            <span>{{ erro }}</span>
        </div>
        {% endif %}
        <form method="post" action="/login">
            <div class="field"><label>Login</label><input name="login" placeholder="ex: admin" autofocus></div>
            <div class="field"><label>Senha</label><input name="senha" type="password" placeholder="••••••••"></div>
            <button class="btn-post" type="submit">Entrar</button>
        </form>
        <div class="login-foot">Clean Architecture · Flask</div>
    </div>
</div>
</body>
</html>
