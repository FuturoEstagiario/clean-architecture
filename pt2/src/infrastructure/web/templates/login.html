<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SGA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrap">
    <div class="card login-card">
        <div class="logo">&#127979; SGA</div>
        <p class="desc">Sistema de Gestão Acadêmica — acesso restrito.</p>
        {% if erro %}<div class="rule">⚠ {{ erro }}</div>{% endif %}
        <form method="post" action="/login">
            <label>Login</label><input name="login" placeholder="ex: admin" autofocus>
            <label>Senha</label><input name="senha" type="password" placeholder="••••••••">
            <button class="btn-post" type="submit">Entrar</button>
        </form>
    </div>
</div>
</body>
</html>
